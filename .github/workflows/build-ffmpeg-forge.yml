# Build FFmpeg across all 8 targets via zackees/forge.
#
# forge builds the recipe on native runners and uploads one
# forge-ffmpeg-<version>-<platform>.tar.gz artifact per target. A follow-up
# step (gen_manifest.py) turns those into the published catalog.
#
# NOTE: forge builds the recipe with its *default* options. conan-center's
# ffmpeg enables the common GPL codecs (x264/x265/...) by default but not the
# nonfree ones (e.g. fdk_aac). To ship a full nonfree build, point recipe_repo/
# recipe_path at a custom recipe whose default_options enable everything. See
# https://github.com/zackees/static_ffmpeg/issues/20
name: build-ffmpeg-forge

on:
  workflow_dispatch:
    inputs:
      version:
        description: FFmpeg version (must exist in the recipe)
        required: true
        default: "8.1.2"
      recipe_repo:
        description: Repo containing the ffmpeg Conan recipe
        required: true
        default: conan-io/conan-center-index
      recipe_ref:
        description: Recipe repo ref
        required: true
        default: master
      recipe_path:
        description: Path to the recipe within recipe_repo
        required: true
        default: recipes/ffmpeg/all

jobs:
  build:
    uses: zackees/forge/.github/workflows/forge-conan.yml@main
    with:
      recipe_repo: ${{ inputs.recipe_repo }}
      recipe_ref: ${{ inputs.recipe_ref }}
      recipe_path: ${{ inputs.recipe_path }}
      name: ffmpeg
      version: ${{ inputs.version }}
      windows_x64: true
      windows_arm64: true
      macos_x64: true
      macos_arm64: true
      linux_x64: true
      linux_arm64: true
      linux_x64_musl: true
      linux_arm64_musl: true
