# Build FFmpeg across all 8 targets via zackees/forge.
#
# forge builds the recipe on native runners and uploads one
# forge-ffmpeg-<version>-<platform>.tar.gz artifact per target. A follow-up
# step (gen_manifest.py) turns those into the published catalog.
#
# Builds recipe-full/conanfile.py: a wrapper that builds conan-center ffmpeg
# with a maximal GPL + nonfree option set, tuned per-platform so it builds on
# stock CI runners (Linux system-dep options off; libaom off on Windows/MSVC).
# See recipe-full/conanfile.py and docs/ffmpeg-options.md.
# https://github.com/zackees/static_ffmpeg/issues/20
name: build-ffmpeg-forge

on:
  workflow_dispatch:
    inputs:
      version:
        description: ffmpeg-full package version (tracks the ffmpeg version)
        required: true
        default: "8.1.2"
      recipe_repo:
        description: Repo containing the Conan recipe
        required: true
        default: zackees/ffmpeg-bins2
      recipe_ref:
        description: Recipe repo ref
        required: true
        default: main
      recipe_path:
        description: Path to the recipe within recipe_repo
        required: true
        default: recipe-full
      # Per-platform toggles so a single target can be re-built in isolation
      # (e.g. iterating on Windows without rebuilding the working platforms).
      windows_x64:      { type: boolean, default: true }
      windows_arm64:    { type: boolean, default: true }
      macos_x64:        { type: boolean, default: true }
      macos_arm64:      { type: boolean, default: true }
      linux_x64:        { type: boolean, default: true }
      linux_arm64:      { type: boolean, default: true }
      linux_x64_musl:   { type: boolean, default: true }
      linux_arm64_musl: { type: boolean, default: true }

jobs:
  build:
    uses: zackees/forge/.github/workflows/forge-conan.yml@main
    with:
      recipe_repo: ${{ inputs.recipe_repo }}
      recipe_ref: ${{ inputs.recipe_ref }}
      recipe_path: ${{ inputs.recipe_path }}
      name: ffmpeg-full
      version: ${{ inputs.version }}
      windows_x64: ${{ inputs.windows_x64 }}
      windows_arm64: ${{ inputs.windows_arm64 }}
      macos_x64: ${{ inputs.macos_x64 }}
      macos_arm64: ${{ inputs.macos_arm64 }}
      linux_x64: ${{ inputs.linux_x64 }}
      linux_arm64: ${{ inputs.linux_arm64 }}
      linux_x64_musl: ${{ inputs.linux_x64_musl }}
      linux_arm64_musl: ${{ inputs.linux_arm64_musl }}
